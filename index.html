<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fardeen S Khadri - Portfolio</title>
    <meta http-equiv="refresh" content="0; url=about.html">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #121212;
            color: #e0e0e0;
        }

        header {
            background: linear-gradient(135deg, #2c2c2c, #1e1e1e);
            color: white;
            padding: 50px 0;
            text-align: center;
            position: relative;
        }

        header::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        header .container {
            position: relative;
            z-index: 2;
        }

        header h1 {
            margin: 0;
            font-size: 3em;
            color: #00f2fe;
        }

        header p {
            margin: 10px 0 20px;
            font-size: 1.2em;
            color: #a0a0a0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: inline-block;
            margin: 20px 0 0;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        nav ul li a:hover {
            background-color: #00f2fe;
            color: #121212;
            border-radius: 5px;
        }

        section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .container {
            margin: 0 auto;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00f2fe;
        }

        footer {
            background: #1e1e1e;
            color: #e0e0e0;
            text-align: center;
            padding: 15px 0;
            position: relative;
        }

        footer p {
            margin: 0;
        }

        .social-icons {
            margin: 10px 0;
        }

        .social-icons a {
            margin: 0 10px;
            text-decoration: none;
            color: #00f2fe;
            font-size: 1.5em;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #e0e0e0;
        }

        .back-to-top {
            position: absolute;
            right: 20px;
            bottom: 20px;
            background-color: #00f2fe;
            color: #121212;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.9em;
            transition: background-color 0.3s;
        }

        .back-to-top:hover {
            background-color: #4facfe;
        }
    </style>
</head>
<body>
    <!-- Content will be skipped and the page will redirect automatically to about.html -->
</body>
</html>
